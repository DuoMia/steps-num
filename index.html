<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步数修改</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 24px; font-size: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .result.success { background: #e8f5e9; color: #2e7d32; }
        .result.error { background: #ffebee; color: #c62828; }
        .result.loading { background: #fff3e0; color: #e65100; }
    </style>
</head>
<body>
    <div class="card">
        <h1>步数修改</h1>
        <form id="form">
            <div class="form-group">
                <label>账号 (手机号/邮箱)</label>
                <input type="text" id="user" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label>步数</label>
                <input type="number" id="step" value="1000" min="1" max="25000" required>
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">提交</button>
        </form>
        <div class="result" id="result"></div>
    </div>

    <script>
        // ⚠️ 部署后修改为你的 Cloudflare Pages 域名
        // 如果在同一域名下，使用相对路径；否则使用完整地址
const API_URL = '/api';
        
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('user').value;
            const password = document.getElementById('password').value;
            const step = document.getElementById('step').value;
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = '提交中...';
            result.style.display = 'none';
            
            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', user, password, step })
                });
                
                const data = await resp.json();
                
                if (data.success) {
                    result.className = 'result success';
                    result.textContent = `✅ ${data.message}`;
                } else {
                    result.className = 'result error';ps://xn--cf-pages-im2mm00bmrkqv6g.pages.dev/api
                    result.textContent = `❌ ${data.message}`;
                }
                result.style.display = 'block';
            } catch (error) {
                result.className = 'result error';
                result.textContent = `❌ 请求失败: ${error.message}`;
                result.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '提交';
            }
        });
    </script>
</body>
</html>
